<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — Opal-Mist-Mist</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
    --text: #e2e8f0; --text2: #94a3b8; --accent: #4f9cf9;
    --red: #ef4444; --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.6;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }

  .wrap { width: 100%; max-width: 400px; padding: 24px; }

  .brand { text-align: center; margin-bottom: 32px; }
  .brand h1 { font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .brand .tagline { font-size: 11px; color: var(--text2); letter-spacing: 0.3px; margin-top: 4px; }
  .brand .tagline span { color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .notice {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .notice.forced {
    color: var(--accent);
    background: rgba(79,156,249,0.08);
    border: 1px solid rgba(79,156,249,0.25);
    border-radius: 7px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 7px;
    padding: 10px 14px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
  }

  .actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-save {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 7px;
    padding: 11px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 11px 18px;
    color: var(--text2);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    transition: color 0.15s;
  }
  .btn-cancel:hover { color: var(--text); }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <h1>Opal-Mist</h1>
    <div class="tagline">
      <span>M</span>ist Customer Risk Dashboard
    </div>
  </div>

  <div class="card">
    <h2>Change Password</h2>

    {% if forced %}
    <div class="notice forced">You must set a new password before continuing.</div>
    {% else %}
    <p class="notice">Signed in as <strong>{{ username }}</strong></p>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/change-password">
      {% if not forced %}
      <div class="field">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" autocomplete="current-password" required>
      </div>
      {% endif %}
      <div class="field">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" autocomplete="new-password" autofocus required>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
      </div>
      <div class="actions">
        <button class="btn-save" type="submit">Update password</button>
        {% if not forced %}
        <a class="btn-cancel" href="/">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>

</body>
</html>
